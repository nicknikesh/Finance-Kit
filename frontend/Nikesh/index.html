<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Viewport & mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030305" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO -->
    <title>Finance Kit — AI-Powered Personal Finance Tracker</title>
    <meta name="description" content="Finance Kit uses Gemini AI to track income, expenses, budgets, and recurring payments. Get smart insights, spending alerts, and downloadable AI financial reports." />
    <meta name="keywords" content="personal finance, budget tracker, expense tracker, AI insights, Gemini AI, spending alerts, financial report" />
    <meta name="author" content="Finance Kit" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Finance Kit — AI-Powered Personal Finance Tracker" />
    <meta property="og:description" content="Track income, expenses, budgets and get AI-powered financial insights with Finance Kit." />
    <meta property="og:image"       content="/favicon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Finance Kit" />
    <meta name="twitter:description" content="AI-powered personal finance tracker with smart insights and budget management." />

    <!-- Accessibility -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts: preconnect first, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Preload critical inline style to prevent FOUC -->
    <style>
      body { background: #030305; color: #fff; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <!-- Skip to main content for screen readers -->
    <a href="#main-content"
      style="position:absolute;top:-40px;left:0;background:#ff4d6d;color:#fff;padding:8px 16px;z-index:9999;border-radius:0 0 8px 0;font-family:sans-serif;font-weight:700;text-decoration:none;transition:top 0.18s"
      onfocus="this.style.top='0'"
      onblur="this.style.top='-40px'"
    >Skip to main content</a>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
